name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  pull-requests: read

jobs:
  release:
    # Guards: only run on canonical repo, skip prereleases (v1.4.0-rc.1)
    if: github.repository == 'kdcokenny/google-maps-link-parser' && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Node 24 ships npm with tokenless OIDC publish support
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="$(node -e "const fs=require('node:fs');const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));process.stdout.write(pkg.version)")"
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [ "${EXPECTED_TAG}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${EXPECTED_TAG}."
            exit 1
          fi

      - name: Verify tag commit matches default branch tip
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ -z "${DEFAULT_BRANCH}" ]; then
            echo "Missing repository default branch from event payload."
            exit 1
          fi

          git fetch --no-tags origin "refs/heads/${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"

          DEFAULT_BRANCH_SHA="$(git rev-parse "refs/remotes/origin/${DEFAULT_BRANCH}")"
          if [ -z "${DEFAULT_BRANCH_SHA}" ]; then
            echo "Failed to resolve origin/${DEFAULT_BRANCH} tip SHA."
            exit 1
          fi

          if [ "${GITHUB_SHA}" != "${DEFAULT_BRANCH_SHA}" ]; then
            echo "Tag commit ${GITHUB_SHA} does not match origin/${DEFAULT_BRANCH} tip ${DEFAULT_BRANCH_SHA}."
            echo "Refusing to publish because releases must be tagged from the default branch tip."
            exit 1
          fi

      - name: Install dependencies
        run: |
          if [ -f bun.lock ]; then
            bun install --frozen-lockfile
          else
            echo "bun.lock is missing. Generating a temporary lockfile for release bootstrap."
            bun install
          fi

      - name: Validate repository
        run: bun run check

      - name: Generate API docs
        run: bun run docs:generate-api

      - name: Validate docs
        run: bun run docs:build

      - name: Build package
        run: bun run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public

      - name: Generate release notes
        id: git_cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip all
        env:
          OUTPUT: CHANGELOG_RELEASE.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG_RELEASE.md
          generate_release_notes: false
